version: '3.9'

services:
  web:
    build: .
    container_name: php-web
    ports:
      - "8080:80"               # Host 8080 -> Container 80
    volumes:
      - ./html:/usr/share/nginx/html:rw
    depends_on:
      - db
    networks:
      - app-net
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: mysql-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb
      MYSQL_USER: user1
      MYSQL_PASSWORD: pass123
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-net

networks:
  app-net:

volumes:
  db-data:
